<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AbsensiKu{% endblock %}</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'ui-sans-serif', 'system-ui'],
            mono: ['"DM Mono"', 'ui-monospace'],
          },
          colors: {
            surface: {
              DEFAULT: '#0f1117',
              card:    '#161b27',
              border:  '#1e2535',
              hover:   '#1a2033',
            },
          },
          keyframes: {
            'slide-in-right': {
              '0%':   { transform: 'translateX(110%)', opacity: '0' },
              '100%': { transform: 'translateX(0)',    opacity: '1' },
            },
            'slide-out-right': {
              '0%':   { transform: 'translateX(0)',    opacity: '1' },
              '100%': { transform: 'translateX(110%)', opacity: '0' },
            },
            'fade-in': {
              '0%':   { opacity: '0' },
              '100%': { opacity: '1' },
            },
            'scale-in': {
              '0%':   { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)',    opacity: '1' },
            },
            'count-up': {
              '0%':   { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            'slide-in-right':  'slide-in-right 0.35s cubic-bezier(0.16,1,0.3,1) both',
            'slide-out-right': 'slide-out-right 0.25s ease-in both',
            'fade-in':         'fade-in 0.2s ease both',
            'scale-in':        'scale-in 0.25s cubic-bezier(0.16,1,0.3,1) both',
            'count-up':        'count-up 0.4s ease both',
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="bg-surface font-sans text-gray-100 min-h-screen antialiased">
  {% block body %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
